<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>超韧AI - 登录</title>
  <style>
    :root {
      --brand-blue: #1767f5;
      --brand-indigo: #314cf7;
      --ink: #0a1630;
      --text: #35445e;
      --muted: #8c9ab0;
      --line: #dce4ef;
      --danger: #dc2626;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      min-width: 320px;
      min-height: 100%;
      margin: 0;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(ellipse 48% 55% at 58% 73%, rgba(119, 162, 255, .19), transparent 70%),
        radial-gradient(ellipse 31% 45% at 87% 24%, rgba(144, 177, 255, .18), transparent 72%),
        linear-gradient(116deg, #fbfcff 0%, #f7faff 41%, #ecf3ff 100%);
    }

    button,
    input { font: inherit; }

    button { cursor: pointer; }

    .login-page {
      position: relative;
      display: grid;
      width: 100vw;
      min-height: 100svh;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(ellipse 52% 48% at 48% 77%, rgba(89, 136, 255, .11), transparent 71%),
        linear-gradient(116deg, rgba(255,255,255,.12), rgba(228,239,255,.2));
    }

    .desktop-stage {
      --u: calc(100cqw / 1672);
      position: relative;
      width: min(100vw, calc(100svh * 1672 / 941));
      aspect-ratio: 1672 / 941;
      container-type: inline-size;
      flex: 0 0 auto;
      overflow: hidden;
    }

    .desktop-stage::before {
      position: absolute;
      top: calc(314 * var(--u));
      left: calc(-110 * var(--u));
      width: calc(1120 * var(--u));
      height: calc(430 * var(--u));
      border: calc(1 * var(--u)) solid rgba(113, 155, 255, .16);
      border-radius: 50%;
      content: "";
      transform: rotate(-8deg);
      pointer-events: none;
    }

    .desktop-stage::after {
      position: absolute;
      top: calc(365 * var(--u));
      left: calc(40 * var(--u));
      width: calc(920 * var(--u));
      height: calc(395 * var(--u));
      border: calc(1 * var(--u)) solid rgba(123, 164, 255, .11);
      border-radius: 50%;
      box-shadow: 0 0 calc(90 * var(--u)) rgba(84, 135, 255, .09);
      content: "";
      transform: rotate(-7deg);
      pointer-events: none;
    }

    .brand {
      position: fixed;
      top: 20px;
      left: 24px;
      z-index: 8;
      display: inline-flex;
      align-items: center;
      gap: 16px;
      color: #0d1423;
      text-decoration: none;
    }

    .brand img {
      display: block;
      width: 52px;
      height: 52px;
      border-radius: 13px;
      object-fit: contain;
      filter: drop-shadow(0 7px 14px rgba(52, 93, 229, .16));
    }

    .brand strong {
      font-size: 36px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: .3px;
    }

    .hero-panel {
      position: absolute;
      inset: 0;
      z-index: 2;
    }

    .hero-copy {
      position: absolute;
      top: calc(128 * var(--u));
      left: calc(130 * var(--u));
      width: calc(742 * var(--u));
    }

    .hero-copy h1 {
      margin: 0;
      color: var(--ink);
      font-size: calc(54 * var(--u));
      font-weight: 800;
      line-height: 1.42;
      letter-spacing: calc(1 * var(--u));
    }

    .hero-copy h1 span {
      display: block;
      color: #165ce7;
    }

    .hero-copy p {
      margin: calc(10 * var(--u)) 0 0;
      color: #4c5d77;
      font-size: calc(16 * var(--u));
      line-height: 1.5;
      letter-spacing: calc(.25 * var(--u));
    }

    .carousel {
      position: absolute;
      top: calc(340 * var(--u));
      left: calc(130 * var(--u));
      width: calc(742 * var(--u));
      height: calc(379 * var(--u));
    }

    .carousel-viewport {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      border: calc(1 * var(--u)) solid rgba(255, 255, 255, .85);
      border-radius: calc(19 * var(--u));
      background: #f8f4ee;
      box-shadow:
        0 calc(22 * var(--u)) calc(48 * var(--u)) rgba(75, 107, 175, .16),
        0 0 calc(55 * var(--u)) rgba(103, 146, 255, .08);
    }

    .slide {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      object-fit: cover;
      object-position: center 49%;
      transform: scale(1.015);
      transition: opacity .38s ease, transform .55s ease;
    }

    .slide.is-active {
      z-index: 1;
      opacity: 1;
      transform: scale(1);
    }

    .slide:nth-child(2) { object-position: center 50%; }
    .slide:nth-child(3) { object-position: center top; }

    .carousel-dots {
      position: absolute;
      top: calc(393 * var(--u));
      left: 50%;
      z-index: 3;
      display: flex;
      align-items: center;
      gap: calc(9 * var(--u));
      transform: translateX(-50%);
    }

    .carousel-dot {
      width: calc(11 * var(--u));
      height: calc(11 * var(--u));
      padding: 0;
      border: 0;
      border-radius: 999px;
      background: #cfd9ea;
      transition: width .2s ease, background .2s ease;
    }

    .carousel-dot.is-active {
      width: calc(24 * var(--u));
      background: #1c67ed;
    }

    .features {
      position: absolute;
      top: calc(770 * var(--u));
      left: calc(160 * var(--u));
      display: grid;
      width: calc(710 * var(--u));
      grid-template-columns: repeat(3, 1fr);
      gap: calc(26 * var(--u));
    }

    .feature {
      display: grid;
      grid-template-columns: calc(41 * var(--u)) 1fr;
      column-gap: calc(16 * var(--u));
      align-items: start;
    }

    .feature-icon {
      display: grid;
      width: calc(41 * var(--u));
      height: calc(41 * var(--u));
      place-items: center;
      border-radius: calc(9 * var(--u));
      color: #fff;
      box-shadow: 0 calc(8 * var(--u)) calc(18 * var(--u)) rgba(46, 90, 235, .19);
    }

    .feature:nth-child(1) .feature-icon { background: linear-gradient(145deg, #06a7ff, #145df0); }
    .feature:nth-child(2) .feature-icon { background: linear-gradient(145deg, #6d5bff, #3f20e9); }
    .feature:nth-child(3) .feature-icon { background: linear-gradient(145deg, #ff717f, #f33370); }

    .feature-icon svg {
      width: calc(22 * var(--u));
      height: calc(22 * var(--u));
      stroke-width: 1.9;
    }

    .feature h3 {
      margin: calc(1 * var(--u)) 0 0;
      color: #121b2d;
      font-size: calc(16 * var(--u));
      font-weight: 750;
      line-height: 1.35;
      white-space: nowrap;
    }

    .feature p {
      margin: calc(7 * var(--u)) 0 0;
      color: #7d8aa0;
      font-size: calc(13 * var(--u));
      line-height: 1.35;
      white-space: nowrap;
    }

    .auth-panel {
      position: absolute;
      top: calc(120 * var(--u));
      left: calc(1022 * var(--u));
      z-index: 4;
      width: calc(535 * var(--u));
      height: calc(708 * var(--u));
    }

    .auth-card {
      width: 100%;
      height: 100%;
      padding: calc(78 * var(--u)) calc(50 * var(--u)) calc(50 * var(--u));
      border: calc(1 * var(--u)) solid rgba(255, 255, 255, .95);
      border-radius: calc(22 * var(--u));
      background: rgba(255, 255, 255, .81);
      box-shadow:
        0 calc(26 * var(--u)) calc(62 * var(--u)) rgba(70, 104, 171, .15),
        inset 0 0 calc(34 * var(--u)) rgba(255, 255, 255, .44);
      backdrop-filter: blur(calc(18 * var(--u)));
    }

    .auth-header { text-align: center; }

    .auth-header h2 {
      margin: 0;
      color: #101624;
      font-size: calc(30 * var(--u));
      font-weight: 800;
      line-height: 1.25;
    }

    .auth-header h2 span { color: #295dec; }

    .auth-header p {
      margin: calc(15 * var(--u)) 0 0;
      color: #7d899d;
      font-size: calc(17 * var(--u));
      line-height: 1.35;
      letter-spacing: calc(.5 * var(--u));
    }

    .login-form { margin-top: calc(64 * var(--u)); }

    .field {
      position: relative;
      display: flex;
      width: 100%;
      height: calc(72 * var(--u));
      align-items: center;
      border: calc(1 * var(--u)) solid #d9e1ed;
      border-radius: calc(11 * var(--u));
      background: rgba(255, 255, 255, .95);
      box-shadow: 0 calc(7 * var(--u)) calc(16 * var(--u)) rgba(66, 93, 142, .035);
      transition: border-color .2s ease, box-shadow .2s ease;
    }

    .field + .field { margin-top: calc(32 * var(--u)); }

    .field:focus-within {
      border-color: #79a1ff;
      box-shadow: 0 0 0 calc(3 * var(--u)) rgba(32, 103, 242, .09);
    }

    .field svg {
      width: calc(24 * var(--u));
      height: calc(24 * var(--u));
      margin-left: calc(22 * var(--u));
      flex: 0 0 auto;
      color: #5c6b86;
      stroke-width: 1.8;
    }

    .field input {
      min-width: 0;
      height: 100%;
      flex: 1;
      padding: 0 calc(20 * var(--u));
      border: 0;
      outline: 0;
      color: #263854;
      font-size: calc(16 * var(--u));
      background: transparent;
    }

    .field input::placeholder { color: #76849a; opacity: 1; }

    .password-toggle {
      display: grid;
      width: calc(52 * var(--u));
      height: 100%;
      place-items: center;
      flex: 0 0 auto;
      padding: 0;
      border: 0;
      color: #596882;
      background: transparent;
    }

    .password-toggle svg {
      width: calc(22 * var(--u));
      height: calc(22 * var(--u));
      margin: 0;
    }

    .captcha-row {
      display: grid;
      grid-template-columns: calc(266 * var(--u)) calc(154 * var(--u));
      gap: calc(15 * var(--u));
      margin-top: calc(36 * var(--u));
    }

    .captcha {
      position: relative;
      display: flex;
      width: calc(154 * var(--u));
      height: calc(72 * var(--u));
      align-items: center;
      justify-content: center;
      gap: calc(7 * var(--u));
      overflow: hidden;
      padding: 0;
      border: calc(1 * var(--u)) solid #dce4ef;
      border-radius: calc(11 * var(--u));
      background:
        repeating-linear-gradient(167deg, transparent 0 calc(13 * var(--u)), rgba(82, 126, 218, .11) calc(14 * var(--u)) calc(16 * var(--u))),
        #f8faf6;
    }

    .captcha::after {
      position: absolute;
      right: calc(8 * var(--u));
      bottom: calc(13 * var(--u));
      left: calc(8 * var(--u));
      height: calc(1 * var(--u));
      background: linear-gradient(90deg, #65a55c, #7659aa, #d36b74);
      content: "";
      transform: rotate(-8deg);
      opacity: .75;
    }

    .captcha span {
      position: relative;
      z-index: 1;
      font-size: calc(26 * var(--u));
      font-weight: 700;
      line-height: 1;
      transform: translateY(calc(-1 * var(--u)));
    }

    .remember {
      display: inline-flex;
      align-items: center;
      gap: calc(10 * var(--u));
      margin-top: calc(18 * var(--u));
      color: #35445e;
      font-size: calc(15 * var(--u));
      line-height: calc(20 * var(--u));
      user-select: none;
    }

    .remember input {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .checkmark {
      position: relative;
      width: calc(20 * var(--u));
      height: calc(20 * var(--u));
      flex: 0 0 auto;
      border: calc(1 * var(--u)) solid #aeb9ca;
      border-radius: calc(4 * var(--u));
      background: #fff;
    }

    .remember input:checked + .checkmark {
      border-color: var(--brand-blue);
      background: var(--brand-blue);
    }

    .remember input:checked + .checkmark::after {
      position: absolute;
      top: calc(3 * var(--u));
      left: calc(6 * var(--u));
      width: calc(5 * var(--u));
      height: calc(9 * var(--u));
      border: solid #fff;
      border-width: 0 calc(2 * var(--u)) calc(2 * var(--u)) 0;
      content: "";
      transform: rotate(45deg);
    }

    .login-button {
      width: 100%;
      height: calc(85 * var(--u));
      margin-top: calc(24 * var(--u));
      border: 0;
      border-radius: calc(11 * var(--u));
      color: #fff;
      font-size: calc(21 * var(--u));
      font-weight: 700;
      letter-spacing: calc(2 * var(--u));
      background: linear-gradient(105deg, #0878ef 0%, #0767f1 55%, #1550ee 100%);
      box-shadow: 0 calc(14 * var(--u)) calc(28 * var(--u)) rgba(32, 89, 232, .22);
      transition: filter .2s ease, transform .2s ease;
    }

    .login-button:hover { filter: brightness(1.04); }
    .login-button:active { filter: brightness(.98); transform: translateY(calc(1 * var(--u))); }

    .form-message {
      min-height: calc(20 * var(--u));
      margin: calc(12 * var(--u)) 0 0;
      color: var(--danger);
      font-size: calc(13 * var(--u));
      text-align: center;
    }

    .copyright {
      position: absolute;
      right: 0;
      bottom: calc(31 * var(--u));
      left: 0;
      z-index: 2;
      margin: 0;
      color: #65738b;
      font-size: calc(14 * var(--u));
      text-align: center;
      letter-spacing: calc(.15 * var(--u));
    }

    @media (max-width: 900px) {
      body { overflow-y: auto; }

      .login-page {
        display: block;
        min-height: 100svh;
        padding: 20px;
        overflow: visible;
      }

      .desktop-stage {
        width: 100%;
        min-height: calc(100svh - 40px);
        padding-top: 52px;
        aspect-ratio: auto;
        container-type: normal;
        overflow: visible;
      }

      .desktop-stage::before,
      .desktop-stage::after,
      .hero-panel,
      .copyright { display: none; }

      .brand {
        position: absolute;
        top: 18px;
        left: 18px;
        gap: 13px;
      }

      .brand img {
        width: 55px;
        height: 55px;
        border-radius: 13px;
      }

      .brand strong { font-size: 33px; }

      .auth-panel {
        position: relative;
        top: auto;
        left: auto;
        width: 100%;
        height: auto;
        margin-top: 28px;
      }

      .auth-card {
        width: min(100%, 520px);
        height: auto;
        min-height: 620px;
        margin: 0 auto;
        padding: 64px 38px 42px;
        border-radius: 24px;
      }

      .auth-header h2 { font-size: 30px; }

      .auth-header p {
        margin-top: 14px;
        font-size: 16px;
      }

      .login-form { margin-top: 56px; }

      .field {
        height: 62px;
        border-width: 1px;
        border-radius: 10px;
      }

      .field + .field { margin-top: 24px; }

      .field svg {
        width: 22px;
        height: 22px;
        margin-left: 20px;
      }

      .field input {
        padding: 0 16px;
        font-size: 16px;
      }

      .password-toggle { width: 50px; }

      .password-toggle svg {
        width: 21px;
        height: 21px;
      }

      .captcha-row {
        grid-template-columns: minmax(0, 1fr) 132px;
        gap: 12px;
        margin-top: 24px;
      }

      .captcha {
        width: 132px;
        height: 62px;
        border-width: 1px;
        border-radius: 10px;
        gap: 5px;
      }

      .captcha span { font-size: 23px; }

      .remember {
        gap: 9px;
        margin-top: 18px;
        font-size: 15px;
        line-height: 20px;
      }

      .checkmark {
        width: 20px;
        height: 20px;
        border-width: 1px;
        border-radius: 4px;
      }

      .remember input:checked + .checkmark::after {
        top: 3px;
        left: 6px;
        width: 5px;
        height: 9px;
        border-width: 0 2px 2px 0;
      }

      .login-button {
        height: 64px;
        margin-top: 28px;
        border-radius: 10px;
        font-size: 19px;
        letter-spacing: 2px;
      }

      .form-message {
        min-height: 20px;
        margin-top: 12px;
        font-size: 13px;
      }
    }

    @media (max-width: 520px) {
      .login-page { padding: 18px; }

      .auth-panel { margin-top: 20px; }

      .auth-card {
        min-height: 580px;
        padding: 52px 22px 34px;
        border-radius: 22px;
      }

      .auth-header h2 { font-size: 27px; }

      .login-form { margin-top: 46px; }

      .captcha-row {
        grid-template-columns: minmax(0, 1fr) 112px;
        gap: 9px;
      }

      .captcha {
        width: 112px;
        gap: 3px;
      }

      .captcha span { font-size: 20px; }
    }
  </style>
</head>
<body>
  <main class="login-page">
    <a class="brand" href="login.html" aria-label="超韧AI 登录页">
      <img src="./chaoren-logo.png" alt="超韧AI Logo">
      <strong>超韧AI</strong>
    </a>

    <div class="desktop-stage">
      <section class="hero-panel" aria-label="超韧AI 电商创作能力">
        <div class="hero-copy">
          <h1>让每件商品<span>拥有更好的展示方式</span></h1>
          <p>AI生成主图、详情图、营销素材，一站式电商创作平台</p>
        </div>

        <div class="carousel" aria-roledescription="轮播图" aria-label="电商创作案例">
          <div class="carousel-viewport">
            <img class="slide is-active" src="./login-assets-v4/rabbit-hero.png" alt="毛绒兔商品场景图">
            <img class="slide" src="./login-assets-v4/carousel-fairy-tale.png" alt="梦幻童话盲盒营销场景图">
            <img class="slide" src="./login-assets-v4/carousel-diffuser.png" alt="白茶香氛产品营销海报">
          </div>
          <div class="carousel-dots" aria-label="选择案例">
            <button class="carousel-dot is-active" type="button" aria-label="查看案例 1" aria-pressed="true"></button>
            <button class="carousel-dot" type="button" aria-label="查看案例 2" aria-pressed="false"></button>
            <button class="carousel-dot" type="button" aria-label="查看案例 3" aria-pressed="false"></button>
          </div>
        </div>

        <div class="features" aria-label="平台能力">
          <article class="feature">
            <span class="feature-icon">
              <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M5 4h10l4 4v12H5z"></path><path d="M15 4v4h4M9 13h6M9 16h4"></path>
              </svg>
            </span>
            <div>
              <h3>主图生成</h3>
              <p>突出卖点，吸引点击</p>
            </div>
          </article>
          <article class="feature">
            <span class="feature-icon">
              <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <rect x="4" y="4" width="16" height="16" rx="2"></rect><path d="M4 10h16M10 4v16"></path>
              </svg>
            </span>
            <div>
              <h3>详情图生成</h3>
              <p>精美排版，清晰传达</p>
            </div>
          </article>
          <article class="feature">
            <span class="feature-icon">
              <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <rect x="3.5" y="5" width="17" height="14" rx="2"></rect><circle cx="9" cy="10" r="1.5"></circle><path d="m5.5 17 4.5-4 3 2.5 2.5-2 3 3.5"></path>
              </svg>
            </span>
            <div>
              <h3>营销海报生成</h3>
              <p>创意海报，提升转化</p>
            </div>
          </article>
        </div>
      </section>

      <section class="auth-panel" aria-label="账号登录">
        <div class="auth-card">
          <header class="auth-header">
            <h2><span>超韧AI</span>欢迎您</h2>
            <p>电商智能创作平台</p>
          </header>

          <form class="login-form" id="loginForm" novalidate>
            <label class="field" for="account">
              <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <circle cx="12" cy="8" r="4"></circle><path d="M4.8 20c.8-4 3.2-6 7.2-6s6.4 2 7.2 6"></path>
              </svg>
              <input id="account" name="account" type="text" autocomplete="username" placeholder="请输入手机号/账号">
            </label>

            <label class="field" for="password">
              <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <rect x="5" y="10" width="14" height="10" rx="2"></rect><path d="M8 10V7a4 4 0 0 1 8 0v3"></path>
              </svg>
              <input id="password" name="password" type="password" autocomplete="current-password" placeholder="请输入密码">
              <button class="password-toggle" id="passwordToggle" type="button" aria-label="显示密码" aria-pressed="false">
                <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                  <path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"></path>
                  <circle cx="12" cy="12" r="2.5"></circle>
                  <path class="eye-slash" d="m4 4 16 16"></path>
                </svg>
              </button>
            </label>

            <div class="captcha-row">
              <label class="field" for="captchaInput">
                <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                  <path d="M5 4h14v16H5z"></path><path d="m8 16 3-3 2.5 2 2-2 1.5 2"></path><circle cx="10" cy="9" r="1.2"></circle>
                </svg>
                <input id="captchaInput" name="captcha" type="text" maxlength="5" autocomplete="off" placeholder="请输入验证码">
              </label>
              <button class="captcha" id="captchaCode" type="button" aria-label="点击刷新验证码"></button>
            </div>

            <label class="remember">
              <input id="remember" type="checkbox">
              <span class="checkmark" aria-hidden="true"></span>
              <span>记住密码</span>
            </label>

            <button class="login-button" type="submit">立即登录</button>
            <p class="form-message" id="formMessage" role="alert" aria-live="polite"></p>
          </form>
        </div>
      </section>

      <p class="copyright">© 2026超韧AI</p>
    </div>
  </main>

  <script>
    (() => {
      const form = document.querySelector('#loginForm');
      const account = document.querySelector('#account');
      const password = document.querySelector('#password');
      const captchaInput = document.querySelector('#captchaInput');
      const captchaCode = document.querySelector('#captchaCode');
      const remember = document.querySelector('#remember');
      const passwordToggle = document.querySelector('#passwordToggle');
      const formMessage = document.querySelector('#formMessage');
      const carousel = document.querySelector('.carousel');
      const slides = Array.from(document.querySelectorAll('.slide'));
      const dots = Array.from(document.querySelectorAll('.carousel-dot'));
      const captchaAlphabet = '23456789ABCDEFGHJKLMNPQRSTUVWXYZ';
      const captchaColors = ['#468047', '#575f78', '#69529b', '#4c687a', '#8c4d67'];
      let currentCaptcha = '';
      let activeSlideIndex = 0;
      let carouselTimer = 0;

      const selectSlide = (index) => {
        activeSlideIndex = index;
        slides.forEach((slide, slideIndex) => {
          slide.classList.toggle('is-active', slideIndex === index);
        });
        dots.forEach((dot, dotIndex) => {
          const active = dotIndex === index;
          dot.classList.toggle('is-active', active);
          dot.setAttribute('aria-pressed', String(active));
        });
      };

      const stopCarousel = () => {
        window.clearInterval(carouselTimer);
        carouselTimer = 0;
      };

      const startCarousel = () => {
        stopCarousel();
        if (document.hidden || slides.length < 2) return;
        carouselTimer = window.setInterval(() => {
          selectSlide((activeSlideIndex + 1) % slides.length);
        }, 6000);
      };

      dots.forEach((dot, index) => {
        dot.addEventListener('click', () => {
          selectSlide(index);
          startCarousel();
        });
      });

      carousel.addEventListener('mouseenter', stopCarousel);
      carousel.addEventListener('mouseleave', startCarousel);
      carousel.addEventListener('focusin', stopCarousel);
      carousel.addEventListener('focusout', startCarousel);
      document.addEventListener('visibilitychange', () => {
        if (document.hidden) stopCarousel();
        else startCarousel();
      });

      const refreshCaptcha = () => {
        currentCaptcha = Array.from({ length: 5 }, () => {
          return captchaAlphabet[Math.floor(Math.random() * captchaAlphabet.length)];
        }).join('');
        captchaCode.replaceChildren(...Array.from(currentCaptcha, (character, index) => {
          const span = document.createElement('span');
          span.textContent = character;
          span.style.color = captchaColors[index];
          span.style.transform = `translateY(${index % 2 === 0 ? '-1px' : '2px'}) rotate(${index % 2 === 0 ? '-4deg' : '4deg'})`;
          return span;
        }));
        captchaInput.value = '';
      };

      const showMessage = (message, isSuccess = false) => {
        formMessage.textContent = message;
        formMessage.style.color = isSuccess ? '#16803a' : '#dc2626';
      };

      try {
        const rememberedAccount = localStorage.getItem('chaorenAIAccount');
        if (rememberedAccount) {
          account.value = rememberedAccount;
          remember.checked = true;
        }
      } catch (error) {
        // Local storage may be unavailable in privacy-restricted environments.
      }

      captchaCode.addEventListener('click', refreshCaptcha);

      passwordToggle.addEventListener('click', () => {
        const showPassword = password.type === 'password';
        password.type = showPassword ? 'text' : 'password';
        passwordToggle.querySelector('.eye-slash').style.display = showPassword ? 'none' : '';
        passwordToggle.setAttribute('aria-label', showPassword ? '隐藏密码' : '显示密码');
        passwordToggle.setAttribute('aria-pressed', String(showPassword));
      });

      form.addEventListener('submit', (event) => {
        event.preventDefault();
        const accountValue = account.value.trim();
        const passwordValue = password.value;
        const captchaValue = captchaInput.value.trim().toUpperCase();

        if (!accountValue) {
          showMessage('请输入手机号或账号');
          account.focus();
          return;
        }
        if (!passwordValue) {
          showMessage('请输入密码');
          password.focus();
          return;
        }
        if (!captchaValue) {
          showMessage('请输入验证码');
          captchaInput.focus();
          return;
        }
        if (captchaValue !== currentCaptcha) {
          showMessage('验证码错误，请重新输入');
          refreshCaptcha();
          captchaInput.focus();
          return;
        }

        try {
          if (remember.checked) {
            localStorage.setItem('chaorenAIAccount', accountValue);
          } else {
            localStorage.removeItem('chaorenAIAccount');
          }
        } catch (error) {
          // Login should remain available when storage is unavailable.
        }

        showMessage('登录成功，正在进入平台…', true);
        window.setTimeout(() => { window.location.href = 'index.html'; }, 500);
      });

      refreshCaptcha();
      startCarousel();
    })();
  </script>
</body>
</html>
