<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>超韧AI - 登录</title>
  <style>
    :root {
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --text: #111827;
      --muted: #667085;
      --line: #dfe4ee;
      --danger: #dc2626;
    }

    * { box-sizing: border-box; }

    html, body { min-height: 100%; }

    body {
      margin: 0;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
      background: #1764b8 url("./login-background.png") center / cover no-repeat fixed;
    }

    button, input { font: inherit; }
    button { cursor: pointer; }

    .login-page {
      position: relative;
      display: grid;
      min-height: 100vh;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
      isolation: isolate;
    }

    .login-page::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -2;
      background: linear-gradient(90deg, rgba(6, 20, 42, .46), rgba(6, 20, 42, .24) 48%, rgba(6, 20, 42, .38));
    }

    .login-page::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      background: linear-gradient(180deg, rgba(6, 20, 42, .22), rgba(6, 20, 42, .08) 52%, rgba(6, 20, 42, .62));
      pointer-events: none;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 28px 4vw 0;
      color: #fff;
      text-shadow: 0 2px 10px rgba(4, 20, 44, .4);
    }

    .brand img {
      width: 62px;
      height: 62px;
      border-radius: 16px;
      object-fit: cover;
      box-shadow: 0 10px 28px rgba(7, 33, 72, .28);
    }

    .brand-name {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 1px;
    }

    .main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(360px, 440px);
      align-items: center;
      gap: 7vw;
      padding: 36px 6vw 56px;
    }

    .slogan {
      align-self: end;
      padding: 0 0 3vh 1vw;
      color: #fff;
      text-shadow: 0 3px 16px rgba(4, 20, 44, .58);
    }

    .slogan h1 {
      margin: 0 0 12px;
      font-size: clamp(34px, 4vw, 60px);
      line-height: 1.15;
      letter-spacing: 2px;
    }

    .slogan p {
      margin: 0;
      font-size: clamp(16px, 1.5vw, 21px);
      letter-spacing: 3px;
    }

    .login-card {
      width: 100%;
      padding: 36px 42px 32px;
      border: 1px solid rgba(255, 255, 255, .78);
      border-radius: 26px;
      background: rgba(248, 251, 255, .94);
      box-shadow: 0 28px 80px rgba(5, 25, 55, .25);
      backdrop-filter: blur(20px);
    }

    .card-brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 34px;
      text-align: center;
    }

    .card-brand h2 {
      margin: 0;
      color: #254f86;
      font-size: 30px;
      font-weight: 800;
      letter-spacing: 2px;
    }

    .card-brand::after {
      content: "";
      width: 44px;
      height: 4px;
      margin-top: 22px;
      border-radius: 999px;
      background: linear-gradient(90deg, #69a3ff, #316ff6);
    }

    .field { position: relative; margin-bottom: 16px; }

    .field label {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      white-space: nowrap;
    }

    .input-wrap { position: relative; }

    .field-icon {
      position: absolute;
      top: 50%;
      left: 16px;
      z-index: 1;
      width: 20px;
      height: 20px;
      transform: translateY(-50%);
      color: #91a1b8;
      pointer-events: none;
    }

    .field-icon svg {
      display: block;
      width: 100%;
      height: 100%;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .input-wrap input {
      width: 100%;
      height: 54px;
      padding: 0 16px 0 48px;
      border: 1px solid #dde4ee;
      border-radius: 10px;
      outline: none;
      color: var(--text);
      background: rgba(255, 255, 255, .96);
      box-shadow: 0 6px 16px rgba(42, 70, 110, .08);
      transition: border-color .2s, box-shadow .2s;
    }

    .input-wrap input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, .12);
    }

    .password-input { padding-right: 48px !important; }

    .password-toggle {
      position: absolute;
      top: 50%;
      right: 8px;
      width: 36px;
      height: 36px;
      padding: 0;
      transform: translateY(-50%);
      border: 0;
      border-radius: 8px;
      color: var(--muted);
      background: transparent;
    }

    .password-toggle:hover { background: #f1f3f8; }

    .password-toggle svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.7;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .captcha-row {
      display: grid;
      grid-template-columns: 1fr 118px;
      gap: 10px;
    }

    .captcha-code {
      height: 54px;
      border: 1px solid #d8ddec;
      border-radius: 10px;
      color: #29325d;
      font-size: 21px;
      font-weight: 800;
      letter-spacing: 5px;
      background:
        linear-gradient(145deg, rgba(79, 70, 229, .1), rgba(37, 99, 235, .03)),
        repeating-linear-gradient(18deg, transparent 0 8px, rgba(79, 70, 229, .08) 9px 10px);
      user-select: none;
    }

    .remember {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 2px 0 22px;
      color: var(--muted);
      font-size: 14px;
      cursor: pointer;
    }

    .remember input {
      width: 16px;
      height: 16px;
      accent-color: var(--primary);
    }

    .login-button {
      width: 100%;
      height: 54px;
      border: 0;
      border-radius: 10px;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 6px;
      background: linear-gradient(90deg, #508af8, #2568ef);
      box-shadow: 0 10px 22px rgba(79, 70, 229, .24);
      transition: transform .2s, box-shadow .2s, background .2s;
    }

    .login-button:hover {
      transform: translateY(-1px);
      background: linear-gradient(90deg, #427def, #1f5fdf);
      box-shadow: 0 14px 26px rgba(79, 70, 229, .3);
    }

    .login-button:active { transform: translateY(0); }

    .form-message {
      min-height: 20px;
      margin: 12px 0 0;
      color: var(--danger);
      font-size: 13px;
      text-align: center;
    }

    .footer {
      padding: 0 24px 22px;
      color: rgba(255, 255, 255, .88);
      font-size: 13px;
      text-align: center;
      text-shadow: 0 2px 8px rgba(4, 20, 44, .52);
    }

    @media (max-width: 820px) {
      body { background-position: 48% center; }
      .brand { padding: 20px 20px 0; }
      .brand img { width: 52px; height: 52px; border-radius: 13px; }
      .brand-name { font-size: 24px; }
      .main { grid-template-columns: 1fr; padding: 28px 18px 40px; }
      .slogan { display: none; }
      .login-card { max-width: 440px; margin: 0 auto; padding: 30px 24px 28px; }
      .card-brand h2 { font-size: 26px; }
    }

    @media (max-width: 420px) {
      .login-card { padding: 26px 18px 24px; border-radius: 18px; }
      .captcha-row { grid-template-columns: 1fr 106px; }
    }
  </style>
</head>
<body>
  <div class="login-page">
    <header class="brand">
      <img src="./chaoren-logo.png" alt="超韧AI Logo" />
      <div class="brand-name">超韧AI</div>
    </header>

    <main class="main">
      <section class="slogan" aria-label="平台介绍">
        <h1>让电商运营更简单</h1>
        <p>超韧AI · 一站式电商智能解决方案</p>
      </section>

      <section class="login-card" aria-labelledby="loginTitle">
        <div class="card-brand">
          <h2 id="loginTitle">超韧AI欢迎你</h2>
        </div>

        <form id="loginForm" novalidate>
          <div class="field">
            <label for="account">账号</label>
            <div class="input-wrap">
              <span class="field-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"></circle><path d="M4.8 20c.7-4 3.1-6 7.2-6s6.5 2 7.2 6"></path></svg></span>
              <input id="account" name="account" type="text" autocomplete="username" placeholder="账号" />
            </div>
          </div>

          <div class="field">
            <label for="password">密码</label>
            <div class="input-wrap">
              <span class="field-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><rect x="5" y="10" width="14" height="10" rx="2"></rect><path d="M8 10V7a4 4 0 0 1 8 0v3"></path><path d="M12 14v2"></path></svg></span>
              <input class="password-input" id="password" name="password" type="password" autocomplete="current-password" placeholder="密码" />
              <button class="password-toggle" id="passwordToggle" type="button" aria-label="显示密码" title="显示密码"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2.5 12s3.5-5 9.5-5 9.5 5 9.5 5-3.5 5-9.5 5-9.5-5-9.5-5z"></path><circle cx="12" cy="12" r="2.5"></circle></svg></button>
            </div>
          </div>

          <div class="field">
            <label for="captchaInput">图形验证码</label>
            <div class="captcha-row">
              <div class="input-wrap">
                <span class="field-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 5h16v14H4z"></path><path d="m7 15 3-3 2 2 2-2 3 3"></path><circle cx="9" cy="9" r="1"></circle></svg></span>
                <input id="captchaInput" name="captcha" type="text" autocomplete="off" maxlength="4" placeholder="验证码" />
              </div>
              <button class="captcha-code" id="captchaCode" type="button" aria-label="点击刷新验证码" title="点击刷新验证码"></button>
            </div>
          </div>

          <label class="remember">
            <input id="remember" name="remember" type="checkbox" />
            <span>记住密码</span>
          </label>

          <button class="login-button" type="submit">登录</button>
          <p class="form-message" id="formMessage" role="alert" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <footer class="footer">© 2026 超韧AI</footer>
  </div>

  <script>
    const loginForm = document.getElementById("loginForm");
    const accountInput = document.getElementById("account");
    const passwordInput = document.getElementById("password");
    const passwordToggle = document.getElementById("passwordToggle");
    const captchaInput = document.getElementById("captchaInput");
    const captchaCode = document.getElementById("captchaCode");
    const formMessage = document.getElementById("formMessage");
    const captchaCharacters = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    let currentCaptcha = "";

    function refreshCaptcha() {
      currentCaptcha = Array.from({ length: 4 }, () => {
        return captchaCharacters[Math.floor(Math.random() * captchaCharacters.length)];
      }).join("");
      captchaCode.textContent = currentCaptcha;
      captchaInput.value = "";
    }

    passwordToggle.addEventListener("click", () => {
      const showPassword = passwordInput.type === "password";
      passwordInput.type = showPassword ? "text" : "password";
      passwordToggle.setAttribute("aria-label", showPassword ? "隐藏密码" : "显示密码");
      passwordToggle.title = showPassword ? "隐藏密码" : "显示密码";
    });

    captchaCode.addEventListener("click", refreshCaptcha);

    loginForm.addEventListener("submit", (event) => {
      event.preventDefault();
      formMessage.textContent = "";

      if (!accountInput.value.trim()) {
        formMessage.textContent = "请输入账号";
        accountInput.focus();
        return;
      }

      if (!passwordInput.value) {
        formMessage.textContent = "请输入密码";
        passwordInput.focus();
        return;
      }

      if (captchaInput.value.trim().toUpperCase() !== currentCaptcha) {
        formMessage.textContent = "图形验证码不正确，请重新输入";
        refreshCaptcha();
        captchaInput.focus();
        return;
      }

      window.location.href = "./index.html";
    });

    refreshCaptcha();
  </script>
</body>
</html>
